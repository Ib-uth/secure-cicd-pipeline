name: Secure CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: app

jobs:
  # ── 1. Unit Tests ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, sqlite3
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run tests
        run: php artisan test

  # ── 2. SAST with Semgrep ───────────────────────────────────────
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/php
            p/owasp-top-ten
            p/sql-injection
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ── 3. Dependency Scanning ─────────────────────────────────────
  dependency-scan:
    name: Dependency Scan — Composer Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run composer audit
        run: composer audit --format=json > dependency-report.json || true
      - name: Check for vulnerabilities
        run: |
          VULNS=$(cat dependency-report.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('advisories', {})))")
          echo "Found $VULNS vulnerable dependencies"
          if [ "$VULNS" -gt "0" ]; then
            echo "❌ Build failed: vulnerable dependencies found"
            cat dependency-report.json
            exit 1
          fi
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: app/dependency-report.json

  # ── 4. Secret Detection — Gitleaks ────────────────────────────
  secret-scan:
    name: Secret Detection — Gitleaks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Docker Image Scan — Trivy ──────────────────────────────
  image-scan:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan, secret-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: app
        run: docker build -t secure-app:${{ github.sha }} .
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-app:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          vuln-type: os,library

  # ── 6. Deploy (only if all checks pass) ───────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [image-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy
        run: echo "✅ All security checks passed. Deploying..."
        # Replace with your actual deployment step
